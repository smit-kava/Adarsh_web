<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 200 200"
  width="200"
  height="200"
  fill="none"
  aria-label="Mechanical gear engineering illustration"
>
  <defs>
    <linearGradient id="gearGrad1" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <linearGradient id="gearGrad2" x1="200" y1="0" x2="0" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#64748b" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>
    <linearGradient id="gearGrad3" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Gear tooth path shape helper: large gear 8 teeth, r=46, hub=22, tooth w=10 h=10 -->
    <!-- Computed as polygon for simplicity -->
  </defs>

  <!-- ═══════════════════════════════════════════════════════════
       LARGE GEAR  — center (80, 100), r=46, 10 teeth
  ════════════════════════════════════════════════════════════════ -->
  <g style="transform-origin:80px 100px; animation: spinCW 8s linear infinite;">
    <!-- Gear body -->
    <circle cx="80" cy="100" r="36" fill="url(#gearGrad1)" opacity="0.12" />
    <circle cx="80" cy="100" r="36" stroke="url(#gearGrad1)" stroke-width="2.5" />

    <!-- 10 teeth for large gear -->
    <g stroke="url(#gearGrad1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <!-- tooth 0°  --> <rect x="75.5" y="56" width="9" height="10" rx="1.5" fill="url(#gearGrad1)" opacity="0.3" transform="rotate(0,80,100)"   />
      <!-- tooth 36° --> <rect x="75.5" y="56" width="9" height="10" rx="1.5" fill="url(#gearGrad1)" opacity="0.3" transform="rotate(36,80,100)"  />
      <!-- tooth 72° --> <rect x="75.5" y="56" width="9" height="10" rx="1.5" fill="url(#gearGrad1)" opacity="0.3" transform="rotate(72,80,100)"  />
      <!-- tooth 108°--> <rect x="75.5" y="56" width="9" height="10" rx="1.5" fill="url(#gearGrad1)" opacity="0.3" transform="rotate(108,80,100)" />
      <!-- tooth 144°--> <rect x="75.5" y="56" width="9" height="10" rx="1.5" fill="url(#gearGrad1)" opacity="0.3" transform="rotate(144,80,100)" />
      <!-- tooth 180°--> <rect x="75.5" y="56" width="9" height="10" rx="1.5" fill="url(#gearGrad1)" opacity="0.3" transform="rotate(180,80,100)" />
      <!-- tooth 216°--> <rect x="75.5" y="56" width="9" height="10" rx="1.5" fill="url(#gearGrad1)" opacity="0.3" transform="rotate(216,80,100)" />
      <!-- tooth 252°--> <rect x="75.5" y="56" width="9" height="10" rx="1.5" fill="url(#gearGrad1)" opacity="0.3" transform="rotate(252,80,100)" />
      <!-- tooth 288°--> <rect x="75.5" y="56" width="9" height="10" rx="1.5" fill="url(#gearGrad1)" opacity="0.3" transform="rotate(288,80,100)" />
      <!-- tooth 324°--> <rect x="75.5" y="56" width="9" height="10" rx="1.5" fill="url(#gearGrad1)" opacity="0.3" transform="rotate(324,80,100)" />
    </g>

    <!-- Spokes -->
    <line x1="80" y1="100" x2="80" y2="72"  stroke="url(#gearGrad1)" stroke-width="1.5" opacity="0.5" />
    <line x1="80" y1="100" x2="80" y2="128" stroke="url(#gearGrad1)" stroke-width="1.5" opacity="0.5" />
    <line x1="80" y1="100" x2="52" y2="100" stroke="url(#gearGrad1)" stroke-width="1.5" opacity="0.5" />
    <line x1="80" y1="100" x2="108" y2="100" stroke="url(#gearGrad1)" stroke-width="1.5" opacity="0.5" />
    <line x1="80" y1="100" x2="60" y2="80"  stroke="url(#gearGrad1)" stroke-width="1.5" opacity="0.4" />
    <line x1="80" y1="100" x2="100" y2="120" stroke="url(#gearGrad1)" stroke-width="1.5" opacity="0.4" />

    <!-- Hub ring -->
    <circle cx="80" cy="100" r="12" stroke="url(#gearGrad1)" stroke-width="2" fill="white" fill-opacity="0.9" />
    <!-- Center bolt -->
    <circle cx="80" cy="100" r="5" fill="url(#gearGrad1)" />
    <circle cx="80" cy="100" r="2.5" fill="white" />
  </g>

  <!-- ═══════════════════════════════════════════════════════════
       SMALL GEAR — center (136, 72), r=22, 6 teeth
       Meshes with large gear: 80+36+10 = 126 → gap ~10px, center at 136
  ════════════════════════════════════════════════════════════════ -->
  <g style="transform-origin:136px 72px; animation: spinCCW 4.8s linear infinite;">
    <!-- Gear body -->
    <circle cx="136" cy="72" r="17" fill="url(#gearGrad2)" opacity="0.12" />
    <circle cx="136" cy="72" r="17" stroke="url(#gearGrad2)" stroke-width="2" />

    <!-- 6 teeth -->
    <g>
      <rect x="132" y="49" width="8" height="8" rx="1.2" fill="url(#gearGrad2)" opacity="0.35" transform="rotate(0,136,72)"   />
      <rect x="132" y="49" width="8" height="8" rx="1.2" fill="url(#gearGrad2)" opacity="0.35" transform="rotate(60,136,72)"  />
      <rect x="132" y="49" width="8" height="8" rx="1.2" fill="url(#gearGrad2)" opacity="0.35" transform="rotate(120,136,72)" />
      <rect x="132" y="49" width="8" height="8" rx="1.2" fill="url(#gearGrad2)" opacity="0.35" transform="rotate(180,136,72)" />
      <rect x="132" y="49" width="8" height="8" rx="1.2" fill="url(#gearGrad2)" opacity="0.35" transform="rotate(240,136,72)" />
      <rect x="132" y="49" width="8" height="8" rx="1.2" fill="url(#gearGrad2)" opacity="0.35" transform="rotate(300,136,72)" />
    </g>

    <!-- Spokes -->
    <line x1="136" y1="72" x2="136" y2="58" stroke="url(#gearGrad2)" stroke-width="1.2" opacity="0.5" />
    <line x1="136" y1="72" x2="136" y2="86" stroke="url(#gearGrad2)" stroke-width="1.2" opacity="0.5" />
    <line x1="136" y1="72" x2="122" y2="72" stroke="url(#gearGrad2)" stroke-width="1.2" opacity="0.5" />
    <line x1="136" y1="72" x2="150" y2="72" stroke="url(#gearGrad2)" stroke-width="1.2" opacity="0.5" />

    <!-- Hub -->
    <circle cx="136" cy="72" r="6" stroke="url(#gearGrad2)" stroke-width="1.5" fill="white" fill-opacity="0.9" />
    <circle cx="136" cy="72" r="2.8" fill="url(#gearGrad2)" />
    <circle cx="136" cy="72" r="1.2" fill="white" />
  </g>

  <!-- ═══════════════════════════════════════════════════════════
       TINY GEAR — center (136, 138), r=16, 5 teeth
  ════════════════════════════════════════════════════════════════ -->
  <g style="transform-origin:136px 138px; animation: spinCW 3.6s linear infinite;">
    <circle cx="136" cy="138" r="12" fill="url(#gearGrad3)" opacity="0.12" />
    <circle cx="136" cy="138" r="12" stroke="url(#gearGrad3)" stroke-width="2" />

    <!-- 5 teeth -->
    <g>
      <rect x="133" y="120" width="6" height="7" rx="1" fill="url(#gearGrad3)" opacity="0.4" transform="rotate(0,136,138)"   />
      <rect x="133" y="120" width="6" height="7" rx="1" fill="url(#gearGrad3)" opacity="0.4" transform="rotate(72,136,138)"  />
      <rect x="133" y="120" width="6" height="7" rx="1" fill="url(#gearGrad3)" opacity="0.4" transform="rotate(144,136,138)" />
      <rect x="133" y="120" width="6" height="7" rx="1" fill="url(#gearGrad3)" opacity="0.4" transform="rotate(216,136,138)" />
      <rect x="133" y="120" width="6" height="7" rx="1" fill="url(#gearGrad3)" opacity="0.4" transform="rotate(288,136,138)" />
    </g>

    <!-- Hub -->
    <circle cx="136" cy="138" r="4.5" stroke="url(#gearGrad3)" stroke-width="1.5" fill="white" fill-opacity="0.9" />
    <circle cx="136" cy="138" r="2" fill="url(#gearGrad3)" />
  </g>

  <!-- ═══════════════════════════════════════════════════════════
       Connecting shaft lines (blueprint style)
  ════════════════════════════════════════════════════════════════ -->
  <line x1="116" y1="83"  x2="119" y2="80"  stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 2" opacity="0.6" />
  <line x1="116" y1="117" x2="119" y2="120" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 2" opacity="0.6" />

  <!-- Blueprint cross-hairs on large gear -->
  <line x1="22" y1="100" x2="38" y2="100" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="4 2" opacity="0.3" />
  <line x1="122" y1="100" x2="138" y2="100" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="4 2" opacity="0.3" />
  <line x1="80" y1="42" x2="80" y2="58" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="4 2" opacity="0.3" />
  <line x1="80" y1="142" x2="80" y2="158" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="4 2" opacity="0.3" />

  <!-- CSS animations embedded -->
  <style>{`
    @keyframes spinCW  { from { transform: rotate(0deg);   } to { transform: rotate(360deg);  } }
    @keyframes spinCCW { from { transform: rotate(0deg);   } to { transform: rotate(-360deg); } }
  `}</style>
</svg>
