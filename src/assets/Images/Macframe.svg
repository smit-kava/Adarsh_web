<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 420 360"
  width="420"
  height="360"
  fill="none"
  aria-label="Mac monitor displaying mechanical engine illustration"
>
  <defs>
    <!-- Monitor body gradient -->
    <linearGradient id="monitorBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Screen background - blueprint blue -->
    <linearGradient id="screenBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1f3c" />
      <stop offset="60%" stop-color="#0a1628" />
      <stop offset="100%" stop-color="#060e1a" />
    </linearGradient>

    <!-- Engine core glow -->
    <radialGradient id="engineGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0" />
    </radialGradient>

    <!-- Arm highlight gradient -->
    <linearGradient id="armGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#93c5fd" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>

    <!-- Chrome stand gradient -->
    <linearGradient id="standGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="40%" stop-color="#94a3b8" />
      <stop offset="60%" stop-color="#cbd5e1" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>

    <!-- Base gradient -->
    <linearGradient id="baseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94a3b8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>

    <!-- Screen glare -->
    <linearGradient id="glare" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>

    <!-- Card bg -->
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#f0f4ff" stop-opacity="0.95" />
    </linearGradient>

    <clipPath id="screenClip">
      <rect x="42" y="22" width="336" height="224" rx="4" />
    </clipPath>
  </defs>

  <!-- ══════════════════════════════════════
       MONITOR BODY
  ═══════════════════════════════════════ -->
  <!-- Outer bezel -->
  <rect x="20" y="8" width="380" height="254" rx="14" fill="url(#monitorBody)" />
  <!-- Inner bezel ring (subtle) -->
  <rect x="24" y="12" width="372" height="246" rx="11" fill="none" stroke="#334155" stroke-width="1" />

  <!-- ══════════════════════════════════════
       SCREEN
  ═══════════════════════════════════════ -->
  <rect x="42" y="22" width="336" height="224" rx="4" fill="url(#screenBg)" />

  <!-- Blueprint grid on screen -->
  <g clip-path="url(#screenClip)" opacity="0.12">
    <line x1="42" y1="50"  x2="378" y2="50"  stroke="#60a5fa" stroke-width="0.5" />
    <line x1="42" y1="80"  x2="378" y2="80"  stroke="#60a5fa" stroke-width="0.5" />
    <line x1="42" y1="110" x2="378" y2="110" stroke="#60a5fa" stroke-width="0.5" />
    <line x1="42" y1="140" x2="378" y2="140" stroke="#60a5fa" stroke-width="0.5" />
    <line x1="42" y1="170" x2="378" y2="170" stroke="#60a5fa" stroke-width="0.5" />
    <line x1="42" y1="200" x2="378" y2="200" stroke="#60a5fa" stroke-width="0.5" />
    <line x1="80"  y1="22" x2="80"  y2="246" stroke="#60a5fa" stroke-width="0.5" />
    <line x1="120" y1="22" x2="120" y2="246" stroke="#60a5fa" stroke-width="0.5" />
    <line x1="160" y1="22" x2="160" y2="246" stroke="#60a5fa" stroke-width="0.5" />
    <line x1="200" y1="22" x2="200" y2="246" stroke="#60a5fa" stroke-width="0.5" />
    <line x1="240" y1="22" x2="240" y2="246" stroke="#60a5fa" stroke-width="0.5" />
    <line x1="280" y1="22" x2="280" y2="246" stroke="#60a5fa" stroke-width="0.5" />
    <line x1="320" y1="22" x2="320" y2="246" stroke="#60a5fa" stroke-width="0.5" />
    <line x1="360" y1="22" x2="360" y2="246" stroke="#60a5fa" stroke-width="0.5" />
  </g>

  <!-- Engine glow -->
  <ellipse cx="210" cy="125" rx="100" ry="80" fill="url(#engineGlow)" clip-path="url(#screenClip)" />

  <!-- ══════════════════════════════════════
       MECHANICAL ARM / ENGINE ILLUSTRATION
  ═══════════════════════════════════════ -->
  <g clip-path="url(#screenClip)">

    <!-- Main engine block -->
    <rect x="130" y="85" width="90" height="70" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.2" />
    <rect x="138" y="93" width="74" height="54" rx="4" fill="#172554" stroke="#2563eb" stroke-width="0.8" />

    <!-- Engine cylinders (top) -->
    <rect x="148" y="72" width="14" height="18" rx="3" fill="#1d4ed8" stroke="#60a5fa" stroke-width="1" />
    <rect x="168" y="68" width="14" height="22" rx="3" fill="#1d4ed8" stroke="#60a5fa" stroke-width="1" />
    <rect x="188" y="72" width="14" height="18" rx="3" fill="#1d4ed8" stroke="#60a5fa" stroke-width="1" />

    <!-- Cylinder caps -->
    <rect x="146" y="70" width="18" height="4" rx="2" fill="#3b82f6" />
    <rect x="166" y="66" width="18" height="4" rx="2" fill="#3b82f6" />
    <rect x="186" y="70" width="18" height="4" rx="2" fill="#3b82f6" />

    <!-- Central rotor -->
    <circle cx="175" cy="122" r="20" fill="#0c1e4a" stroke="#3b82f6" stroke-width="1.5" />
    <circle cx="175" cy="122" r="13" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1" />
    <circle cx="175" cy="122" r="6"  fill="#3b82f6" />
    <circle cx="175" cy="122" r="3"  fill="#93c5fd" />

    <!-- Rotor spokes -->
    <line x1="175" y1="109" x2="175" y2="103" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" />
    <line x1="175" y1="135" x2="175" y2="141" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" />
    <line x1="162" y1="122" x2="156" y2="122" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" />
    <line x1="188" y1="122" x2="194" y2="122" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" />

    <!-- Engine bolts -->
    <circle cx="140" cy="94"  r="2.5" fill="#334155" stroke="#60a5fa" stroke-width="0.8" />
    <circle cx="210" cy="94"  r="2.5" fill="#334155" stroke="#60a5fa" stroke-width="0.8" />
    <circle cx="140" cy="148" r="2.5" fill="#334155" stroke="#60a5fa" stroke-width="0.8" />
    <circle cx="210" cy="148" r="2.5" fill="#334155" stroke="#60a5fa" stroke-width="0.8" />

    <!-- ── MECHANICAL ARM ── -->
    <!-- Upper arm segment -->
    <rect x="210" y="100" width="55" height="16" rx="8" fill="url(#armGrad)" />
    <rect x="210" y="134" width="55" height="16" rx="8" fill="url(#armGrad)" />

    <!-- Elbow joint -->
    <circle cx="265" cy="108" r="11" fill="#1d4ed8" stroke="#93c5fd" stroke-width="1.5" />
    <circle cx="265" cy="108" r="5"  fill="#3b82f6" />
    <circle cx="265" cy="142" r="11" fill="#1d4ed8" stroke="#93c5fd" stroke-width="1.5" />
    <circle cx="265" cy="142" r="5"  fill="#3b82f6" />

    <!-- Forearm -->
    <rect x="262" y="108" width="52" height="12" rx="6" fill="#2563eb" stroke="#93c5fd" stroke-width="1" />
    <rect x="262" y="130" width="52" height="12" rx="6" fill="#2563eb" stroke="#93c5fd" stroke-width="1" />

    <!-- Wrist connector -->
    <rect x="308" y="104" width="10" height="42" rx="5" fill="#1e40af" stroke="#60a5fa" stroke-width="1" />

    <!-- Claw / gripper -->
    <!-- Main claw body -->
    <rect x="316" y="112" width="22" height="26" rx="4" fill="#172554" stroke="#3b82f6" stroke-width="1" />
    <!-- Claw fingers -->
    <path d="M338 114 C352 110 358 116 355 124 C352 130 342 128 338 126" fill="#1d4ed8" stroke="#60a5fa" stroke-width="1" />
    <path d="M338 126 C352 126 358 132 355 140 C352 146 342 144 338 138" fill="#1d4ed8" stroke="#60a5fa" stroke-width="1" />
    <!-- Claw tip highlights -->
    <path d="M353 122 C357 119 358 124 355 124" fill="#93c5fd" opacity="0.7" />
    <path d="M353 138 C357 135 358 140 355 140" fill="#93c5fd" opacity="0.7" />

    <!-- Hydraulic tubes -->
    <path d="M220 94 C230 80 250 78 265 82" stroke="#475569" stroke-width="2.5" fill="none" stroke-linecap="round" />
    <path d="M220 96 C230 82 250 80 265 84" stroke="#64748b" stroke-width="1" fill="none" stroke-linecap="round" />
    <path d="M220 158 C230 172 250 174 265 170" stroke="#475569" stroke-width="2.5" fill="none" stroke-linecap="round" />

    <!-- Exhaust pipes left -->
    <rect x="110" y="98"  width="22" height="8" rx="4" fill="#334155" stroke="#475569" stroke-width="0.8" />
    <rect x="110" y="113" width="22" height="8" rx="4" fill="#334155" stroke="#475569" stroke-width="0.8" />
    <rect x="110" y="128" width="22" height="8" rx="4" fill="#334155" stroke="#475569" stroke-width="0.8" />
    <!-- Exhaust opening rings -->
    <circle cx="112" cy="102" r="3" fill="#0f172a" stroke="#60a5fa" stroke-width="0.8" />
    <circle cx="112" cy="117" r="3" fill="#0f172a" stroke="#60a5fa" stroke-width="0.8" />
    <circle cx="112" cy="132" r="3" fill="#0f172a" stroke="#60a5fa" stroke-width="0.8" />

    <!-- Data labels (blueprint style) -->
    <text x="55" y="45" font-family="monospace" font-size="7" fill="#3b82f6" opacity="0.7">MODEL: AK-4000</text>
    <text x="55" y="54" font-family="monospace" font-size="7" fill="#60a5fa" opacity="0.6">STATUS: ACTIVE</text>
    <text x="280" y="45" font-family="monospace" font-size="7" fill="#3b82f6" opacity="0.7">RPM: 4,200</text>
    <text x="280" y="54" font-family="monospace" font-size="7" fill="#60a5fa" opacity="0.6">EFF: 98.2%</text>

    <!-- Blueprint dimension lines -->
    <line x1="130" y1="168" x2="220" y2="168" stroke="#3b82f6" stroke-width="0.6" stroke-dasharray="3 2" opacity="0.5" />
    <line x1="130" y1="165" x2="130" y2="171" stroke="#3b82f6" stroke-width="0.8" opacity="0.5" />
    <line x1="220" y1="165" x2="220" y2="171" stroke="#3b82f6" stroke-width="0.8" opacity="0.5" />
    <text x="166" y="178" font-family="monospace" font-size="6.5" fill="#60a5fa" opacity="0.7" text-anchor="middle">90mm</text>

    <!-- Scan lines overlay (subtle) -->
    <rect x="42" y="22" width="336" height="224" fill="url(#glare)" />
  </g>

  <!-- ══════════════════════════════════════
       STATUS BAR at bottom of screen
  ═══════════════════════════════════════ -->
  <rect x="42" y="214" width="336" height="32" rx="0" fill="#060e1a" opacity="0.85" />
  <circle cx="60" cy="230" r="7" fill="#1d4ed8" opacity="0.9" />
  <circle cx="60" cy="230" r="4" fill="#3b82f6" />
  <text x="74" y="226" font-family="'Inter', system-ui, sans-serif" font-size="8" fill="#94a3b8">Project Status</text>
  <text x="74" y="238" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff">98% Optimized</text>

  <!-- ══════════════════════════════════════
       CAMERA DOT
  ═══════════════════════════════════════ -->
  <circle cx="210" cy="15" r="3" fill="#1e293b" stroke="#334155" stroke-width="0.8" />
  <circle cx="210" cy="15" r="1.5" fill="#0f172a" />

  <!-- ══════════════════════════════════════
       STAND
  ═══════════════════════════════════════ -->
  <!-- Neck -->
  <rect x="196" y="262" width="28" height="46" rx="6" fill="url(#standGrad)" />
  <!-- Neck detail line -->
  <line x1="210" y1="264" x2="210" y2="306" stroke="#cbd5e1" stroke-width="0.8" opacity="0.4" />

  <!-- Base -->
  <ellipse cx="210" cy="312" rx="72" ry="10" fill="url(#baseGrad)" />
  <!-- Base highlight -->
  <ellipse cx="210" cy="310" rx="68" ry="6" fill="none" stroke="#94a3b8" stroke-width="0.8" opacity="0.5" />

  <!-- ══════════════════════════════════════
       APPLE LOGO on stand
  ═══════════════════════════════════════ -->
  <text x="210" y="297" font-family="system-ui" font-size="11" fill="#475569" text-anchor="middle" opacity="0.7"></text>

  <!-- Monitor bottom edge shine -->
  <line x1="24" y1="258" x2="396" y2="258" stroke="#334155" stroke-width="0.8" opacity="0.6" />
  <line x1="22" y1="256" x2="398" y2="256" stroke="#475569" stroke-width="0.5" opacity="0.3" />

</svg>
