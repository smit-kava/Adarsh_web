    <rect x="45" y="4" width="10" height="92" rx="2" fill="currentColor" transform="rotate(30 50 50)" />
    <rect x="45" y="4" width="10" height="92" rx="2" fill="currentColor" transform="rotate(60 50 50)" />
    <rect x="45" y="4" width="10" height="92" rx="2" fill="currentColor" transform="rotate(90 50 50)" />
    <rect x="45" y="4" width="10" height="92" rx="2" fill="currentColor" transform="rotate(120 50 50)" />
    <rect x="45" y="4" width="10" height="92" rx="2" fill="currentColor" transform="rotate(150 50 50)" />
    <circle cx="50" cy="50" r="40" fill="currentColor" />
  </g>

  <rect x="47" y="12" width="6" height="76" fill="currentColor" mask="url(#gear-mask)" />
  <rect x="47" y="12" width="6" height="76" fill="currentColor" mask="url(#gear-mask)" transform="rotate(90 50 50)" />
  <circle cx="50" cy="50" r="14" fill="currentColor" mask="url(#gear-mask)" />
